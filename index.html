<!DOCTYPE html>
<html>
<body>
    <h2>Dice API Test</h2>
    <button onclick="testRoll()">Test Roll</button>
    <pre id="output"></pre>

    <script>
        async function testRoll() {
            const res = await fetch("/api/roll?count=5&sides=6");
            const data = await res.json();
            document.getElementById("output").textContent =
                JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
